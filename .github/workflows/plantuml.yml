name: Generate PlantUML Diagrams

on:
  push:
    paths:
      - 'docs/**.puml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Java e PlantUML
        run: |
          sudo apt-get install -y default-jre graphviz
          wget -q https://github.com/plantuml/plantuml/releases/download/v1.2024.6/plantuml-1.2024.6.jar -O plantuml.jar

      - name: Gerar SVG
        run: java -jar plantuml.jar -tsvg docs/casos-de-uso.puml

      - name: Commit e push do SVG gerado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/casos-de-uso.svg
          git diff --staged --quiet || git commit -m "ci: atualiza diagrama de casos de uso (SVG)"
          git push origin HEAD:main
